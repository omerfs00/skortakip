<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>📱 Skor Tablosu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #FDF2F8; --card-bg: #FFFFFF; --text-main: #303A2B; --accent: #FF99C9; --periwinkle: #C1BDDB; --winner: #58FCEC; --record: #FFD700; --border: #FCE7F3; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; }
        
        /* GİRİŞ EKRANI */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85vh; width: 100%; }
        .login-card { background: var(--card-bg); padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 95%; max-width: 350px; }
        input { padding: 12px; margin: 8px 0; border: 2px solid var(--border); border-radius: 12px; width: 100%; outline: none; }
        .login-btn { padding: 12px 30px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }

        #kpss-box { background: #FFF5F9; border: 2px solid var(--accent); padding: 18px; border-radius: 20px; margin-bottom: 15px; width: 100%; max-width: 550px; cursor: pointer; text-align: center; display: none; }
        #kpss-content { font-size: 0.9rem; font-weight: 600; color: #86198F; }

        /* ANA TABLO KONTEYNERI */
        .container { background: var(--card-bg); padding: 25px; border-radius: 30px; width: 100%; max-width: 550px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; display: none; }
        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        #bar-begum { height: 100%; background: var(--accent); transition: 0.5s; }
        #bar-omer { height: 100%; background: var(--periwinkle); transition: 0.5s; }
        .total-card { background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 5px; display: flex; justify-content: space-around; border: 2px solid var(--accent); }
        .total-val { font-size: 1.1rem; font-weight: 800; }
        .table-wrapper { width: 100%; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th, td { padding: 12px 5px; text-align: center; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        .winner-cell { position: relative; cursor: pointer; }
        .win-border { border-bottom: 3px solid var(--winner); }
        .winner-text { font-weight: 800; color: #1e293b; }
        .record-holder { font-weight: 900; border-bottom: 4px solid var(--record) !important; color: #8B8000 !important; }
        .speech-bubble { visibility: hidden; background: var(--text-main); color: #fff; border-radius: 8px; padding: 10px; position: absolute; z-index: 1000; bottom: 120%; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.3s; min-width: 140px; font-size: 0.75rem; box-shadow: 0 5px 15px rgba(0,0,0,0.2); white-space: normal; word-wrap: break-word; pointer-events: none; }
        .winner-cell:hover .speech-bubble { visibility: visible; opacity: 1; }

        /* SEKMELER VE OYUNLAR */
        .tab-nav { display: none; gap: 8px; margin: 10px auto; width: 100%; max-width: 550px; background: white; padding: 6px; border-radius: 20px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; background: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; color: #64748b; }
        .tab-btn.active { background: var(--accent); color: white; }
        
        /* ÖNEMLİ: Giriş yapana kadar gizli kalmasını sağlar */
        .game-panel { background: white; border-radius: 30px; padding: 25px; margin: 0 auto 180px auto; width: 100%; max-width: 550px; border: 1px solid var(--border); text-align: center; display: none !important; }
        .active-panel { display: block !important; }

        /* GRIDLER */
        .xox-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 240px; margin: 0 auto; }
        .xox-cell { background: #FFF5F9; border: 1px solid var(--border); height: 55px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 900; border-radius: 12px; cursor: pointer; }
        .w-grid { display: flex; flex-direction: column; gap: 6px; margin: 15px auto; }
        .w-row { display: flex; gap: 6px; justify-content: center; }
        .w-cell { width: 42px; height: 42px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 10px; font-size: 1.3rem; text-transform: uppercase; transition: 0.3s; }
        .correct { background: #6aaa64 !important; color: white !important; border-color: #6aaa64 !important; }
        .present { background: #c9b458 !important; color: white !important; border-color: #c9b458 !important; }
        .absent { background: #787c7e !important; color: white !important; border-color: #787c7e !important; }
        .subscore { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
        .round-btn { margin-top: 10px; width: 70%; }
        .hangman-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .hangman-svg { width: 180px; height: 200px; }
        .hangman-part { stroke: #1f2937; stroke-width: 4; fill: none; opacity: 0.15; transition: opacity 0.25s ease; }
        .hangman-part.on { opacity: 1; }
        .h-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; max-width: 100%; }
        .h-cell { width: 34px; height: 42px; font-size: 1.1rem; }
        .h-gap { width: 20px; height: 42px; margin-right: 20px; }
        .letters-used { font-size: 0.9rem; color: #64748b; min-height: 20px; }
        .feedback-text { font-size: 0.9rem; font-weight: 700; color: #0f766e; min-height: 20px; }
        .summary-wrap { text-align: left; display: flex; flex-direction: column; gap: 10px; }
        .summary-title { font-size: 0.85rem; color: #475569; font-weight: 700; }
        .summary-wordle-grid { display: flex; flex-direction: column; gap: 6px; }
        .summary-wordle-row { display: flex; gap: 6px; justify-content: center; }
        .summary-cell { width: 28px; height: 28px; border: 2px solid #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; }
        .summary-line { font-size: 0.85rem; color: #334155; }

        /* ADMIN PANELİ */
        #admin-panel { display: none; margin-top: 25px; padding: 20px; background: #FFF5F9; border-radius: 20px; border: 1.5px dashed var(--accent); text-align: left; }
        .admin-input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); }
        
        /* MODAL FIX */
        #history-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; }

        .music-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 2px solid var(--border); padding: 8px 0; display: none; justify-content: center; z-index: 999; }
        #youtube-container { width: 95%; max-width: 450px; height: 90px; border-radius: 12px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card"><h2>🔒 Giriş</h2><input type="text" id="user" placeholder="İsim"><input type="password" id="pass" placeholder="Şifre"><button class="login-btn" onclick="checkLogin()">Giriş Yap</button></div>
</div>

<div id="kpss-box" onclick="showNextFact()"><div id="kpss-content">Yükleniyor...</div></div>

<div class="container" id="main-site">
    <div class="total-card"><div>Begüm <br><span id="total-begum" class="total-val" style="color:var(--accent)">--:--</span></div><div style="width: 1px; background: var(--border);"></div><div>Ömer <br><span id="total-omer" class="total-val" style="color:var(--periwinkle)">--:--</span></div></div>
    <div class="progress-container"><div id="bar-begum"></div><div id="bar-omer"></div></div>
    <div class="table-wrapper"><table><thead><tr><th>Hafta</th><th>Begüm</th><th>Ömer</th><th>🎵 Şarkı</th></tr></thead><tbody id="table-body"></tbody></table></div>
    
    <div id="admin-panel">
        <h4 style="margin:0 0 5px 0">🛠️ Haftayı Güncelle</h4>
        <input type="text" id="new-note" class="admin-input" placeholder="Haftalık not..">
        <input type="text" id="new-song-id" class="admin-input" placeholder="YouTube Video ID">

</div>

<div class="tab-nav" id="game-tabs">

    <button class="tab-btn" onclick="showTab('wordle', event)">📝 Wordle</button>

</div>

        <div style="color: var(--accent);">B: <span id="xox-b">0</span><div class="subscore">Tur: <span id="xox-rb">0</span></div></div>
        <div style="color: var(--periwinkle);">Ö: <span id="xox-o">0</span><div class="subscore">Tur: <span id="xox-ro">0</span></div></div>

    </div>
    <p id="w-hint" style="font-size:0.95rem; font-weight:600; color:#64748b; margin:15px 0;"></p>
    
    <div id="w-setup" style="display:none">
        <input type="text" id="w-secret" placeholder="5-7 harfli kelime.." maxlength="7" style="text-align:center; border:2px solid var(--border); border-radius:10px; padding:8px;">
        <button class="login-btn" onclick="setWordle()" style="margin-top:10px">Kilitle</button>
    </div>
    
    <div id="w-play" style="display:none">
        <div id="w-board" class="w-grid"></div>
        <div id="w-input-area">
            <input type="text" id="w-guess" maxlength="7" style="text-align:center; border:2px solid var(--border); border-radius:10px; padding:10px; width:70%;" onkeyup="if(event.key==='Enter') submitGuess()">
            <button id="w-submit-btn" class="login-btn" onclick="submitGuess()" style="width:70%; margin-top:5px;">Tahmin Et</button>
        </div>
    </div>
    <p id="w-feedback" class="feedback-text"></p>
    <button class="login-btn round-btn" onclick="openRoundSummary('wordle')">Geçmiş Tur</button>

<div id="hangman-panel" class="game-panel">
    <div style="display:flex; justify-content:space-around; font-weight:800; margin-bottom:10px;">
        <div style="color: var(--accent);">B: <span id="h-b">0</span></div>
        <div style="color: var(--periwinkle);">Ö: <span id="h-o">0</span></div>
    </div>
    <p id="h-hint" style="font-size:0.95rem; font-weight:600; color:#64748b; margin:15px 0;"></p>
    <p id="h-feedback" class="feedback-text"></p>

    <div id="h-setup" style="display:none">
        <input type="text" id="h-secret" placeholder="Kelime/Cumle (max 50 karakter)" maxlength="50" style="text-align:center; border:2px solid var(--border); border-radius:10px; padding:8px;">
        <input type="text" id="h-clue" placeholder="İpucu" maxlength="80" style="text-align:center; border:2px solid var(--border); border-radius:10px; padding:8px;">

    <div id="h-play" style="display:none" class="hangman-wrap">

            <line x1="20" y1="185" x2="120" y2="185" class="hangman-part" style="opacity:1"></line>

            <line x1="50" y1="20" x2="115" y2="20" class="hangman-part" style="opacity:1"></line>
            <line x1="115" y1="20" x2="115" y2="38" class="hangman-part" style="opacity:1"></line>
            <circle cx="115" cy="56" r="18" id="h-part-1" class="hangman-part"></circle>
            <line x1="115" y1="74" x2="115" y2="122" id="h-part-2" class="hangman-part"></line>
            <line x1="115" y1="92" x2="90" y2="108" id="h-part-3" class="hangman-part"></line>
            <line x1="115" y1="92" x2="140" y2="108" id="h-part-4" class="hangman-part"></line>
            <line x1="115" y1="122" x2="95" y2="150" id="h-part-5" class="hangman-part"></line>
            <line x1="115" y1="122" x2="135" y2="150" id="h-part-6" class="hangman-part"></line>
        </svg>
        <div id="h-board" class="h-board"></div>
        <div id="h-used" class="letters-used"></div>
        <div id="h-input-area">
            <input type="text" id="h-guess" maxlength="1" placeholder="Harf" style="text-align:center; border:2px solid var(--border); border-radius:10px; padding:10px; width:70%; text-transform:lowercase;" onkeyup="if(event.key==='Enter') submitHangmanGuess()">
            <button id="h-submit-btn" class="login-btn" onclick="submitHangmanGuess()" style="width:70%; margin-top:5px;">Harf Tahmin Et</button>
        </div>
    </div>
    <button class="login-btn round-btn" onclick="openRoundSummary('hangman')">Geçmiş Tur</button>
</div>

<div id="history-modal"><div class="modal-content"><h3 style="margin-top:0">🎵 Arşiv</h3><div id="history-list" style="max-height:250px; overflow-y:auto;"></div><button class="login-btn" onclick="closeModal()" style="margin-top:15px">Kapat</button></div></div>
<div id="round-modal" style="display:none; position:fixed; z-index:10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;"><div class="modal-content"><h3 id="round-modal-title" style="margin-top:0">Geçmiş Tur</h3><div id="round-summary-content" style="text-align:left; max-height:320px; overflow:auto; background:#f8fafc; border-radius:10px; padding:10px; font-size:0.8rem;"></div><button class="login-btn" onclick="closeRoundModal()" style="margin-top:15px">Kapat</button></div></div>
<div class="music-bar" id="music-player"><div id="youtube-container"></div></div>

<script>
    const kFacts = ["Yeni Zigana Tüneli: 14,5 km ile Türkiye'nin en uzun tüneli.", "Yusufeli Barajı: Türkiye'nin en yüksek barajı.", "Milletvekili Sayısı: TBMM'de 600 vekil bulunur.", "Gordion Antik Kenti: UNESCO listesine giren 20. varlığımız."];
    let kIdx = 0;
    const SB_URL = "https://yczoplqskmrolpbdbsnp.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljem9wbHFza21yb2xwYmRic25wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDQ3ODAsImV4cCI6MjA4NjU4MDc4MH0.hmEnEHugyTU6gLkFHJ9qsMVKETWCI6YN24SShfol6sc";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    const EMPTY_XOX_BOARD = ["", "", "", "", "", "", "", "", "", "", "", "", "", "", "", ""];
    const XOX_TRIPLES = buildXOXTriples();
    const DataAdapters = {
        xox(raw) {
            return {
                board: parseJsonField(raw.board, EMPTY_XOX_BOARD.slice()),
                turn: raw.turn,
                begumWins: raw.begum_wins || 0,
                omerWins: raw.omer_wins || 0
            };
        },
        wordle(raw) {
            return {
                raw,
                word: (raw.kelime || "").toLowerCase(),
                status: raw.durum,
                setter: raw.belirleyen,
                length: raw.harf_sayisi || 0,
                guesses: parseJsonField(raw.tahminler, []),
                begumScore: raw.begum_toplam_puan || 0,
                omerScore: raw.omer_toplam_puan || 0,
                lastRoundSummary: raw.son_tur_ozeti || null
            };
        },
        hangman(raw) {
            const scores = typeof raw.puanlar === 'string' ? parseJsonField(raw.puanlar, {}) : (raw.puanlar || {});
            return {
                raw,
                word: (raw.kelime || "").toLowerCase(),
                clue: raw.ipucu || "",
                setter: raw.belirleyen || "Begüm",
                status: raw.durum || "bekliyor",
                wrongLetters: parseJsonField(raw.yanlis_harfler, []),
                correctLetters: parseJsonField(raw.dogru_harfler, []),
                begumScore: scores.begum || 0,
                omerScore: scores.omer || 0,
                lastRoundSummary: raw.son_tur_ozeti || null
            };
        }
    };
    let loggedInUser = "";
    let wordleWaiting = false;
    let hangmanWaiting = false;
    let wordleMessageTimer = null;
    let hangmanMessageTimer = null;

    function parseJsonField(value, fallback) {
        if (value === null || value === undefined) return fallback;
        if (typeof value === 'object') return value;
        try { return JSON.parse(value); } catch { return fallback; }
    }

    function buildXOXTriples() {
        const lines = [];
        const idx = (r, c) => r * 4 + c;
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c <= 1; c++) lines.push([idx(r, c), idx(r, c + 1), idx(r, c + 2)]);
        }
        for (let c = 0; c < 4; c++) {
            for (let r = 0; r <= 1; r++) lines.push([idx(r, c), idx(r + 1, c), idx(r + 2, c)]);
        }
        for (let r = 0; r <= 1; r++) {
            for (let c = 0; c <= 1; c++) lines.push([idx(r, c), idx(r + 1, c + 1), idx(r + 2, c + 2)]);
        }
        for (let r = 0; r <= 1; r++) {
            for (let c = 2; c <= 3; c++) lines.push([idx(r, c), idx(r + 1, c - 1), idx(r + 2, c - 2)]);
        }
        return lines;
    }

    function countXOXTriples(board, symbol) {
        return XOX_TRIPLES.reduce((acc, line) => {
            return acc + (line.every(i => board[i] === symbol) ? 1 : 0);
        }, 0);
    }

    function buildFrequencyMap(word) {
        const map = {};
        for (const ch of word) map[ch] = (map[ch] || 0) + 1;
        return map;
    }

    function evaluateWordleGuess(secret, guess) {
        const marks = Array(guess.length).fill('absent');
        const freq = buildFrequencyMap(secret);
        for (let i = 0; i < guess.length; i++) {
            if (guess[i] === secret[i]) {
                marks[i] = 'correct';
                freq[guess[i]] -= 1;
            }
        }
        for (let i = 0; i < guess.length; i++) {
            if (marks[i] === 'correct') continue;
            const ch = guess[i];
            if ((freq[ch] || 0) > 0) {
                marks[i] = 'present';
                freq[ch] -= 1;
            }
        }
        return marks;
    }

    function switchUser(user) {
        return user === "Ömer" ? "Begüm" : "Ömer";
    }

    function setWordleInputState(disabled) {
        const wInput = document.getElementById('w-guess');
        const wBtn = document.getElementById('w-submit-btn');
        if (wInput) wInput.disabled = disabled;
        if (wBtn) wBtn.disabled = disabled;
    }

    function setHangmanInputState(disabled) {
        const hInput = document.getElementById('h-guess');
        const hBtn = document.getElementById('h-submit-btn');
        if (hInput) hInput.disabled = disabled;
        if (hBtn) hBtn.disabled = disabled;
    }

    async function fetchWordleAndRender() {
        const { data } = await _supabase.from('wordle_durumu').select('*').eq('id', 1).single();
        if (data) renderWordle(data);
    }

    async function fetchHangmanAndRender() {
        const { data } = await _supabase.from('adam_asmaca_durumu').select('*').eq('id', 1).single();
        if (data) renderHangman(data);
    }

    function serializePayloadForSupabase(payload) {
        const serialized = {};
        Object.keys(payload).forEach(key => {
            const value = payload[key];
            if (Array.isArray(value)) {
                serialized[key] = JSON.stringify(value);
                return;
            }
            if (value && typeof value === 'object') {
                serialized[key] = JSON.stringify(value);
                return;
            }
            serialized[key] = value;
        });
        return serialized;
    }

    async function updateRowWithDebug(table, payload, rowId = 1) {
        const serializedPayload = serializePayloadForSupabase(payload);
        const result = await _supabase.from(table).update(serializedPayload).eq('id', rowId);
        if (result.error) {
            console.error(`Supabase update error [${table}]`, result.error, serializedPayload);
            alert(`DB update hatasi [${table}]: ${result.error.message || 'Bilinmeyen hata'}`);
        }
        return result;
    }

    async function resetHangmanRoundAtomic(nextSetter, nextScores, summary) {
        const primaryPayload = {
            durum: 'bekliyor',
            kelime: null,
            ipucu: null,
            yanlis_harfler: [],
            dogru_harfler: [],
            belirleyen: nextSetter,
            puanlar: JSON.stringify({ begum: nextScores.begum, omer: nextScores.omer }),
            son_tur_ozeti: summary
        };
        return updateRowWithDebug('adam_asmaca_durumu', primaryPayload, 1);
    }

    function showTransientMessage(targetId, timerKey, message, ms = 2000) {
        const el = document.getElementById(targetId);
        if (!el) return;
        el.innerText = message;
        if (timerKey === 'wordle' && wordleMessageTimer) clearTimeout(wordleMessageTimer);
        if (timerKey === 'hangman' && hangmanMessageTimer) clearTimeout(hangmanMessageTimer);
        const timer = setTimeout(() => { el.innerText = ''; }, ms);
        if (timerKey === 'wordle') wordleMessageTimer = timer;
        if (timerKey === 'hangman') hangmanMessageTimer = timer;
    }

    function escapeHtml(v) {
        return (v || '').toString()
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    async function makeMoveXOX(idx, data) {
        const ui = DataAdapters.xox(data);
        const b = ui.board;
        const turn = ui.turn;
        if(b[idx] !== "" || turn !== loggedInUser) return;
        b[idx] = turn === "Ömer" ? "X" : "O";
        let next = switchUser(turn);
        let ups = { board: JSON.stringify(b), turn: next };
        if(!b.includes("")) {
            const roundBegum = countXOXTriples(b, 'O');
            const roundOmer = countXOXTriples(b, 'X');
            let begumWins = ui.begumWins;
            let omerWins = ui.omerWins;
            if (roundBegum > roundOmer) begumWins += 1;
            if (roundOmer > roundBegum) omerWins += 1;
            ups = { board: JSON.stringify(EMPTY_XOX_BOARD), turn: "Begüm", begum_wins: begumWins, omer_wins: omerWins };
        }
        await updateRowWithDebug('xox_durumu', ups, 1);
    }

                cell.innerText = '';
            }

        });

        if (!clue) return alert('İpucu gerekli.');
        const { error } = await updateRowWithDebug('adam_asmaca_durumu', { kelime: word, ipucu: clue, durum: 'belirlendi', yanlis_harfler: [], dogru_harfler: [' '] }, 1);

    async function submitHangmanGuess() {
        const inp = document.getElementById('h-guess');
        const letter = inp.value.trim().toLowerCase();
        inp.value = '';
        if (!letter || !/^[a-zA-ZığüşöçİĞÜŞÖÇ]$/.test(letter)) return alert('Tek bir harf gir.');

        const { data: db } = await _supabase.from('adam_asmaca_durumu').select('*').eq('id', 1).single();
        const ui = DataAdapters.hangman(db);
        if (ui.setter === loggedInUser || ui.status !== 'belirlendi') return;
        if (ui.correctLetters.includes(letter) || ui.wrongLetters.includes(letter)) return;
        hangmanWaiting = true;
        setHangmanInputState(true);
        document.getElementById('h-hint').innerText = 'Tahmin gönderildi, güncelleme bekleniyor...';

        let correctLetters = ui.correctLetters.slice();
        let wrongLetters = ui.wrongLetters.slice();
        let begumScore = ui.begumScore;
        let omerScore = ui.omerScore;
        const setter = ui.setter;

        if (ui.word.includes(letter)) {
            correctLetters.push(letter);
            const solved = ui.word.split('').every(ch => {
                if (!/[a-zA-ZığüşöçİĞÜŞÖÇ]/.test(ch)) return true;
                return correctLetters.includes(ch);
            });

            if (solved) {
                const lives = Math.max(0, 6 - wrongLetters.length);
                const pts = lives * 3;
                if (loggedInUser === 'Ömer') omerScore += pts;
                else begumScore += pts;
                const summary = {
                    oyun: 'adam_asmaca',
                    sonuc: 'tahminci_kazandi',
                    kelime: ui.word,
                    ipucu: ui.clue,
                    yanlis_harfler: wrongLetters,
                    tahminci: loggedInUser,
                    belirleyen: setter,
                    kalan_can: lives,
                    puan: pts,
                    tarih: new Date().toISOString()
                };
                const { error: finishError } = await resetHangmanRoundAtomic(
                    switchUser(setter),
                    { begum: begumScore, omer: omerScore },
                    summary
                );
                if (finishError) {
                    hangmanWaiting = false;
                    setHangmanInputState(false);
                    document.getElementById('h-hint').innerText = `İpucu: ${ui.clue || '-'}`;
                    return;
                }
                await fetchHangmanAndRender();
                fireConfetti();
                showTransientMessage('h-feedback', 'hangman', `Tebrikler! +${pts} puan`, 2000);
                alert(`Tebrikler! +${pts} puan`);
                return;
            }
            const { error: okError } = await updateRowWithDebug('adam_asmaca_durumu', { dogru_harfler: correctLetters }, 1);
            if (okError) {
                hangmanWaiting = false;
                setHangmanInputState(false);
                document.getElementById('h-hint').innerText = `İpucu: ${ui.clue || '-'}`;
                return;
            }
            await fetchHangmanAndRender();
            return;
        }

        wrongLetters.push(letter);
        if (wrongLetters.length >= 6) {
            if (setter === 'Ömer') omerScore += 5;
            else begumScore += 5;
            const summary = {
                oyun: 'adam_asmaca',
                sonuc: 'belirleyen_kazandi',
                kelime: ui.word,
                ipucu: ui.clue,
                yanlis_harfler: wrongLetters,
                tahminci: loggedInUser,
                belirleyen: setter,
                puan: 5,
                tarih: new Date().toISOString()
            };
            const { error: finishError } = await resetHangmanRoundAtomic(
                switchUser(setter),
                { begum: begumScore, omer: omerScore },
                summary
            );
            if (finishError) {
                hangmanWaiting = false;
                setHangmanInputState(false);
                document.getElementById('h-hint').innerText = `İpucu: ${ui.clue || '-'}`;
                return;
            }
            await fetchHangmanAndRender();
            showTransientMessage('h-feedback', 'hangman', `Tur bitti. Dogru kelime: ${ui.word.toUpperCase()} | ${setter} +5`, 2000);
            alert(`Tur bitti. Dogru kelime: ${ui.word.toUpperCase()} | ${setter} +5 puan`);
            return;
        }

        const { error: wrongError } = await updateRowWithDebug('adam_asmaca_durumu', { yanlis_harfler: wrongLetters }, 1);
        if (wrongError) {
            hangmanWaiting = false;
            setHangmanInputState(false);
            document.getElementById('h-hint').innerText = `İpucu: ${ui.clue || '-'}`;
            return;
        }
        await fetchHangmanAndRender();
    }

    function closeModal() { document.getElementById('history-modal').style.display = 'none'; }
    async function updateWeekData() {
        const n = document.getElementById('new-note').value; const v = document.getElementById('new-song-id').value.trim();
        if(!v) return;
        const res = await (await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${v}`)).json();
        const { data: recs } = await _supabase.from('skor_verileri').select('id').order('id', { ascending: false }).limit(1);
        await updateRowWithDebug('skor_verileri', { haftanin_notu: n, sarki_adi: res.title, sarki_linki: v }, recs[0].id);
        await _supabase.from('sarki_gecmisi').insert([{ week_id: recs[0].id, sarki_adi: res.title, sarki_linki: v }]);
        location.reload();
    }
    function showAdminIfWinner(d) { const l = d[0]; if(loggedInUser === (l.begum_sure > l.omer_sure ? "Begüm" : "Ömer")) { document.getElementById('admin-panel').style.display = 'block'; document.getElementById('new-note').value = l.haftanin_notu || ""; } }
    function updateMusic(l) { if(l && l.sarki_linki) document.getElementById('youtube-container').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${l.sarki_linki.trim()}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>`; }
    function toMinutes(v) { if(!v) return 0; const p = v.toString().split('.'); return (parseInt(p[0])*60) + (parseInt(p[1]||0)); }
    function formatTime(tm) { return `${Math.floor(tm/60)}s ${tm%60 < 10 ? '0'+(tm%60) : tm%60}dk`; }
    function fireConfetti() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
</script>
